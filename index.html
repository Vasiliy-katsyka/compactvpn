<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compact VPN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#050505', primary: '#3b82f6', accent: '#8b5cf6' },
                    animation: { 'float': 'float 6s ease-in-out infinite', 'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite' },
                    keyframes: { float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050505; color: #ffffff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-active { background: rgba(59, 130, 246, 0.15); backdrop-filter: blur(24px); border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .text-gradient { background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .calc-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .calc-btn:active { transform: scale(0.97); }
        .tg-btn { background: linear-gradient(135deg, #2563eb, #7c3aed); transition: all 0.3s ease; }
        .tg-btn:hover { box-shadow: 0 0 30px rgba(124, 58, 237, 0.5); transform: translateY(-2px); }
        
        /* Стили для модалки профиля */
        #profile-modal { transition: opacity 0.3s ease; }
        #profile-modal.hidden { opacity: 0; pointer-events: none; display: flex !important; z-index: -1; }
    </style>
</head>
<body class="antialiased selection:bg-primary selection:text-white">

    <div class="fixed top-[0%] left-[-10%] w-[300px] h-[300px] sm:w-[50vw] sm:h-[50vw] bg-blue-600/40 sm:bg-blue-600/20 rounded-full blur-[90px] sm:blur-[120px] pointer-events-none z-[-1] animate-pulse-slow"></div>
    <div class="fixed bottom-[-5%] right-[-10%] w-[300px] h-[300px] sm:w-[50vw] sm:h-[50vw] bg-purple-600/40 sm:bg-purple-600/20 rounded-full blur-[90px] sm:blur-[120px] pointer-events-none z-[-1]"></div>

    <!-- Header -->
    <div class="fixed top-4 left-0 right-0 z-50 px-3 sm:px-4 flex justify-center">
        <nav class="glass w-full max-w-4xl rounded-full px-3 sm:px-4 py-2 sm:py-3 flex items-center justify-between shadow-2xl">
            <div class="flex items-center gap-1 sm:gap-2">
                <lottie-player src="https://raw.githubusercontent.com/Vasiliy-katsyka/compactvpn/refs/heads/main/CherryEmoji_AgADPxkAAiX9qUo.json" background="transparent" speed="1" style="width: 32px; height: 32px;" loop autoplay></lottie-player>
                <span class="font-bold text-sm sm:text-lg tracking-wide whitespace-nowrap">Compact VPN</span>
            </div>
            
            <div class="flex items-center gap-3">
                <!-- Контейнер для кнопки логина / профиля -->
                <div id="auth-container">
                    <!-- ЗАМЕНИ data-telegram-login НА ИМЯ ТВОЕГО БОТА БЕЗ @ -->
                    <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-login="compact_vpn_bot" data-size="medium" data-radius="20" data-onauth="onTelegramAuth(user)" data-request-access="write"></script>
                </div>
                
                <button id="profile-btn" onclick="toggleProfile()" class="hidden bg-white/10 hover:bg-white/20 border border-white/5 text-white px-4 py-1.5 rounded-full transition text-sm font-semibold flex items-center gap-2">
                    <img id="user-avatar" src="" class="w-6 h-6 rounded-full" alt="Avatar">
                    <span id="user-name">Кабинет</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Модальное окно Личного Кабинета -->
    <div id="profile-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="glass w-full max-w-md rounded-3xl p-6 sm:p-8 relative border border-white/10 shadow-2xl transform scale-95 transition-transform duration-300" id="profile-content">
            <button onclick="toggleProfile()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold mb-1">Личный кабинет</h2>
                <p id="sub-status-text" class="text-gray-400 text-sm">Загрузка данных...</p>
            </div>

            <div id="profile-loader" class="flex justify-center py-8">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
            </div>

            <div id="profile-data" class="hidden space-y-4">
                <div class="bg-white/5 rounded-xl p-4 border border-white/5">
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-400">Статус:</span>
                        <span id="sub-status" class="font-bold text-green-400">Активен</span>
                    </div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="text-gray-400">Действует до:</span>
                        <span id="sub-expiry" class="font-bold">--</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-400">Устройств:</span>
                        <span id="sub-devices" class="font-bold">--</span>
                    </div>
                </div>

                <div class="bg-white/5 rounded-xl p-4 border border-white/5">
                    <p class="text-sm text-gray-400 mb-2">Твоя ссылка для подключения:</p>
                    <div class="flex items-center gap-2">
                        <input type="text" id="sub-link" readonly class="w-full bg-black/50 border border-white/10 rounded-lg px-3 py-2 text-sm text-gray-300 outline-none">
                        <button onclick="copyLink()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-2 rounded-lg text-sm font-semibold transition">Копия</button>
                    </div>
                </div>

                <button onclick="toggleProfile(); document.getElementById('calculator').scrollIntoView();" class="w-full bg-white/10 hover:bg-white/20 border border-white/10 text-white py-3 rounded-xl font-semibold transition mt-2">
                    Продлить подписку
                </button>
                <button onclick="logout()" class="w-full text-red-400 hover:text-red-300 text-sm py-2 mt-2 transition">Выйти из аккаунта</button>
            </div>
            
            <div id="profile-empty" class="hidden text-center py-4">
                <p class="text-gray-300 mb-4">У тебя пока нет активной подписки.</p>
                <button onclick="toggleProfile(); document.getElementById('calculator').scrollIntoView();" class="w-full tg-btn text-white py-3 rounded-xl font-semibold transition">
                    Оформить тариф
                </button>
                <button onclick="logout()" class="w-full text-red-400 hover:text-red-300 text-sm py-2 mt-4 transition">Выйти из аккаунта</button>
            </div>
        </div>
    </div>

    <!-- Главный экран и Преимущества (Оставлены без изменений для краткости) -->
    <section class="relative pt-32 sm:pt-40 pb-16 px-4 max-w-5xl mx-auto text-center z-10">
        <h1 class="text-5xl sm:text-7xl font-extrabold tracking-tight mb-6 leading-tight">Твой интернет, <br /><span class="text-gradient">без границ.</span></h1>
        <p class="text-base sm:text-xl text-gray-400 max-w-2xl mx-auto mb-10 leading-relaxed px-4">Обходи блокировки, смотри YouTube 4K и листай Instagram без замедлений.</p>
    </section>

    <!-- Калькулятор Тарифов -->
    <section id="calculator" class="py-10 relative z-10 max-w-4xl mx-auto px-4">
        <div class="glass rounded-[2rem] p-5 sm:p-10 shadow-2xl relative">
            
            <div class="mb-8 relative z-10">
                <label class="block text-sm sm:text-base font-medium text-gray-300 mb-4 ml-1">Сколько устройств подключим?</label>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    <button onclick="setDev(1)" class="calc-btn dev-btn glass text-white py-3 rounded-2xl text-sm font-semibold" data-val="1">1 устройство</button>
                    <button onclick="setDev(2)" class="calc-btn dev-btn glass text-white py-3 rounded-2xl text-sm font-semibold" data-val="2">2 устройства</button>
                    <button onclick="setDev(3)" class="calc-btn dev-btn glass text-white py-3 rounded-2xl text-sm font-semibold" data-val="3">3 устройства</button>
                    <button onclick="setDev(0)" class="calc-btn dev-btn glass text-white py-3 rounded-2xl text-sm font-semibold" data-val="0">Безлимит ♾️</button>
                </div>
            </div>

            <div class="mb-10 relative z-10">
                <label class="block text-sm sm:text-base font-medium text-gray-300 mb-4 ml-1">На какой срок?</label>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-x-3 gap-y-6 sm:gap-3 mt-4">
                    <button onclick="setMo(1)" class="calc-btn mo-btn glass text-white py-3 rounded-2xl text-sm font-semibold" data-val="1">1 месяц</button>
                    <button onclick="setMo(3)" class="calc-btn mo-btn glass text-white py-3 rounded-2xl text-sm font-semibold relative" data-val="3">3 месяца <span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-blue-500 text-white text-[10px] px-2 py-0.5 rounded-full">-10%</span></button>
                    <button onclick="setMo(6)" class="calc-btn mo-btn glass text-white py-3 rounded-2xl text-sm font-semibold relative" data-val="6">6 месяцев <span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-purple-500 text-white text-[10px] px-2 py-0.5 rounded-full">-15%</span></button>
                    <button onclick="setMo(12)" class="calc-btn mo-btn glass text-white py-3 rounded-2xl text-sm font-semibold relative" data-val="12">1 год <span class="absolute -top-3 left-1/2 -translate-x-1/2 bg-green-500 text-white text-[10px] px-2 py-0.5 rounded-full">-20%</span></button>
                </div>
            </div>

            <!-- Выбор метода оплаты (Появляется, если залогинен) -->
            <div id="payment-methods" class="mb-8 hidden transition-all">
                <label class="block text-sm sm:text-base font-medium text-gray-300 mb-4 ml-1">Способ оплаты</label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setMethod('sbp')" class="calc-btn method-btn glass-active text-blue-100 py-3 rounded-xl text-sm font-semibold" data-val="sbp">СБП</button>
                    <button onclick="setMethod('card')" class="calc-btn method-btn glass text-white py-3 rounded-xl text-sm font-semibold" data-val="card">Банковская карта</button>
                </div>
            </div>

            <div class="h-px w-full bg-white/10 mb-8"></div>

            <div class="flex flex-col sm:flex-row items-center justify-between gap-6 relative z-10">
                <div class="text-center sm:text-left w-full sm:w-auto">
                    <p class="text-gray-400 text-sm mb-1 uppercase tracking-wider font-medium">К оплате</p>
                    <div class="flex items-baseline justify-center sm:justify-start gap-1">
                        <span id="price-display" class="text-5xl sm:text-6xl font-extrabold text-white">150</span>
                        <span class="text-2xl text-blue-400 font-bold">₽</span>
                    </div>
                </div>
                
                <button id="buy-btn" onclick="handleBuy()" class="tg-btn w-full sm:w-auto px-8 py-4 rounded-2xl font-bold text-lg text-white shadow-lg">
                    Оплатить тариф
                </button>
            </div>
        </div>
    </section>

    <!-- Скрипты -->
    <script>
        // === НАСТРОЙКИ ===
        // УКАЖИ ЗДЕСЬ АДРЕС ТВОЕГО СЕРВЕРА (ГДЕ КРУТИТСЯ BOT.PY И ОТКРЫТ ПОРТ 5000 или 8443)
        const API_BASE_URL = "http://77.221.159.199:5000"; 
        const BOT_USERNAME = "compact_vpn_bot"; // Твой бот

        const prices = {
            "1_1": 150,  "2_1": 200,  "3_1": 250,  "0_1": 400,
            "1_3": 405,  "2_3": 540,  "3_3": 675,  "0_3": 1000,
            "1_6": 765,  "2_6": 1020, "3_6": 1275, "0_6": 1500,
            "1_12": 1440,"2_12": 1920,"3_12": 2400,"0_12": 3500
        };

        let currentDev = 1;
        let currentMo = 1;
        let currentMethod = 'sbp';
        let tgUser = JSON.parse(localStorage.getItem('tgUser')) || null;

        // Инициализация при загрузке
        window.onload = () => {
            updateUI();
            checkAuthUI();
        }

        // Авторизация через Telegram Widget
        function onTelegramAuth(user) {
            localStorage.setItem('tgUser', JSON.stringify(user));
            tgUser = user;
            checkAuthUI();
        }

        function logout() {
            localStorage.removeItem('tgUser');
            tgUser = null;
            checkAuthUI();
            toggleProfile();
        }

        // Обновление кнопок интерфейса
        function checkAuthUI() {
            const authContainer = document.getElementById('auth-container');
            const profileBtn = document.getElementById('profile-btn');
            const paymentMethods = document.getElementById('payment-methods');
            const buyBtn = document.getElementById('buy-btn');

            if (tgUser) {
                // Залогинен
                authContainer.classList.add('hidden');
                profileBtn.classList.remove('hidden');
                document.getElementById('user-avatar').src = tgUser.photo_url || 'https://t.me/favicon.ico';
                paymentMethods.classList.remove('hidden');
                buyBtn.innerText = "Перейти к оплате 💳";
            } else {
                // Не залогинен
                authContainer.classList.remove('hidden');
                profileBtn.classList.add('hidden');
                paymentMethods.classList.add('hidden');
                buyBtn.innerText = "Оплатить через Telegram";
            }
        }

        // Управление калькулятором
        function updateUI() {
            document.querySelectorAll('.dev-btn').forEach(btn => {
                btn.className = parseInt(btn.dataset.val) === currentDev ? 'calc-btn dev-btn glass-active text-blue-100 py-3 rounded-2xl text-sm font-semibold' : 'calc-btn dev-btn glass text-white py-3 rounded-2xl text-sm font-semibold';
            });
            document.querySelectorAll('.mo-btn').forEach(btn => {
                let isAct = parseInt(btn.dataset.val) === currentMo;
                btn.className = `calc-btn mo-btn ${isAct ? 'glass-active text-blue-100' : 'glass text-white'} py-3 rounded-2xl text-sm font-semibold relative`;
            });
            document.querySelectorAll('.method-btn').forEach(btn => {
                btn.className = btn.dataset.val === currentMethod ? 'calc-btn method-btn glass-active text-blue-100 py-3 rounded-xl text-sm font-semibold' : 'calc-btn method-btn glass text-white py-3 rounded-xl text-sm font-semibold';
            });

            document.getElementById('price-display').innerText = prices[`${currentDev}_${currentMo}`];
        }

        function setDev(val) { currentDev = val; updateUI(); }
        function setMo(val) { currentMo = val; updateUI(); }
        function setMethod(val) { currentMethod = val; updateUI(); }

        // Логика покупки
        async function handleBuy() {
            const btn = document.getElementById('buy-btn');
            
            // Если не залогинен - перекидываем в бота (старый способ)
            if (!tgUser) {
                window.location.href = `https://t.me/${BOT_USERNAME}?start=buy_${currentDev}_${currentMo}`;
                return;
            }

            // Если залогинен - создаем счет через API
            btn.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white inline-block"></div> Загрузка...`;
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/api/pay`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        auth: tgUser,
                        devices: currentDev,
                        months: currentMo,
                        method: currentMethod
                    })
                });

                const data = await res.json();
                
                if (data.paymentUrl) {
                    window.location.href = data.paymentUrl; // Перенаправляем на Lava
                } else {
                    alert('Ошибка создания счета: ' + (data.error || 'Неизвестно'));
                    btn.innerText = "Перейти к оплате 💳";
                }
            } catch (err) {
                console.error(err);
                alert('Ошибка соединения с сервером.');
                btn.innerText = "Перейти к оплате 💳";
            }
            btn.disabled = false;
        }

        // Модалка Личного кабинета
        function toggleProfile() {
            const modal = document.getElementById('profile-modal');
            const content = document.getElementById('profile-content');
            
            if (modal.classList.contains('hidden')) {
                // Открываем
                modal.classList.remove('hidden');
                setTimeout(() => { modal.style.opacity = '1'; content.style.transform = 'scale(1)'; }, 10);
                loadProfileData();
            } else {
                // Закрываем
                modal.style.opacity = '0';
                content.style.transform = 'scale(0.95)';
                setTimeout(() => { modal.classList.add('hidden'); }, 300);
            }
        }

        // Загрузка данных кабинета
        async function loadProfileData() {
            if (!tgUser) return;
            
            document.getElementById('profile-loader').classList.remove('hidden');
            document.getElementById('profile-data').classList.add('hidden');
            document.getElementById('profile-empty').classList.add('hidden');
            document.getElementById('sub-status-text').innerText = "Синхронизация с ботом...";

            try {
                const res = await fetch(`${API_BASE_URL}/api/profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(tgUser)
                });
                const data = await res.json();

                document.getElementById('profile-loader').classList.add('hidden');

                if (data.status === 'no_sub') {
                    document.getElementById('sub-status-text').innerText = "У тебя пока нет подписки";
                    document.getElementById('profile-empty').classList.remove('hidden');
                } else {
                    document.getElementById('sub-status-text').innerText = "Данные успешно загружены";
                    document.getElementById('profile-data').classList.remove('hidden');
                    
                    const statusEl = document.getElementById('sub-status');
                    if(data.status === 'active') {
                        statusEl.innerText = "Активен"; statusEl.className = "font-bold text-green-400";
                    } else {
                        statusEl.innerText = "Истек"; statusEl.className = "font-bold text-red-400";
                    }
                    
                    document.getElementById('sub-expiry').innerText = data.expiry;
                    document.getElementById('sub-devices').innerText = data.devices;
                    document.getElementById('sub-link').value = data.link;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('profile-loader').classList.add('hidden');
                document.getElementById('sub-status-text').innerText = "Ошибка загрузки данных.";
            }
        }

        function copyLink() {
            const linkInput = document.getElementById('sub-link');
            linkInput.select();
            document.execCommand('copy');
            alert('Ссылка скопирована!');
        }
    </script>
</body>
</html>
